<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jellyfin Login - FlixWolf EPG</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/app.css" rel="stylesheet">
</head>
<body>
<main class="auth-panel">
  <h1 class="h3 mb-2">FlixWolf EPG</h1>
  <p class="text-secondary">Login with your Jellyfin account to view the public guide.</p>
  <div class="card">
    <div class="card-body">
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post" action="/public/login">
        <input type="hidden" name="return_to" value="{{ return_to }}">
        <label class="form-label" for="username">Jellyfin Username</label>
        <input class="form-control mb-3" id="username" name="username" autocomplete="username" required>
        <label class="form-label" for="password">Jellyfin Password</label>
        <input class="form-control mb-3" id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="btn btn-gold w-100" type="submit">Continue</button>
      </form>
    </div>
  </div>
</main>
</body>
</html>
