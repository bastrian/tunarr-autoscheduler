<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Tunarr AutoScheduler</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/static/app.css" rel="stylesheet">
</head>
<body>
<main class="auth-panel">
  <h1 class="h3 mb-3">Tunarr AutoScheduler</h1>
  <div class="card">
    <div class="card-body">
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <label class="form-label" for="username">Username</label>
        <input class="form-control mb-3" id="username" name="username" value="{{ username or 'admin' }}" required>
        <label class="form-label" for="password">Password</label>
        <input class="form-control mb-3" id="password" name="password" type="password" required>
        <button class="btn btn-gold w-100" type="submit">Login</button>
      </form>
    </div>
  </div>
</main>
</body>
</html>
